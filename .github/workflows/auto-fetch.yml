name: Auto Fetch Actas

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install -r requirements.txt || true
          pip install requests beautifulsoup4 python-dateutil tqdm huggingface_hub

      - name: Run auto_fetch
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          python auto_fetch.py
